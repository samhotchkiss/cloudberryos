<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bottomScrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#050f14" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#050f14" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#050f14" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="topScrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#050f14" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#050f14" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="berry" cx="0.35" cy="0.3" r="0.75">
      <stop offset="0" stop-color="#f4a0b6"/>
      <stop offset="0.5" stop-color="#d64d78"/>
      <stop offset="1" stop-color="#a12d55"/>
    </radialGradient>
  </defs>

  <!-- the real wallpaper art, cover-cropped -->
  <image xlink:href="cloudberryos-wallpaper-3840.png" x="0" y="0" width="1200" height="630" preserveAspectRatio="xMidYMid slice"/>

  <!-- scrims for legibility -->
  <rect x="0" y="0" width="1200" height="150" fill="url(#topScrim)"/>
  <rect x="0" y="250" width="1200" height="380" fill="url(#bottomScrim)"/>

  <!-- brand mark, top-left -->
  <g transform="translate(64,58)">
    <circle cx="14" cy="13" r="15" fill="url(#berry)"/>
    <circle cx="8.5" cy="8.5" r="3.2" fill="#ffffff" opacity="0.55"/>
    <text x="43" y="22" fill="#ffffff" font-size="28" font-weight="700" letter-spacing="0.3">CloudberryOS</text>
  </g>

  <!-- headline, bottom-left -->
  <text x="66" y="474" fill="#ffffff" font-size="62" font-weight="800" letter-spacing="-1.4">The internet as a</text>
  <text x="66" y="546" fill="#ffffff" font-size="62" font-weight="800" letter-spacing="-1.4">library, <tspan fill="#ffd477">not a casino.</tspan></text>

  <!-- url, bottom-right -->
  <text x="1136" y="590" fill="#ffe08a" font-size="26" font-weight="700" letter-spacing="0.5" text-anchor="end">cloudberryos.org</text>
</svg>
