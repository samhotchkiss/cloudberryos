<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12262b"/>
      <stop offset="0.45" stop-color="#2f6f73"/>
      <stop offset="1" stop-color="#f2c05c"/>
    </linearGradient>
    <linearGradient id="hillA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#315d55"/>
      <stop offset="1" stop-color="#6f9d68"/>
    </linearGradient>
    <linearGradient id="hillB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1c383b"/>
      <stop offset="1" stop-color="#46736d"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff2b5"/>
      <stop offset="0.7" stop-color="#e9b44c"/>
      <stop offset="1" stop-color="#d79436" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="berry" cx="0.35" cy="0.3" r="0.75">
      <stop offset="0" stop-color="#f4a0b6"/>
      <stop offset="0.5" stop-color="#d64d78"/>
      <stop offset="1" stop-color="#a12d55"/>
    </radialGradient>
    <linearGradient id="scrim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06171a" stop-opacity="0.82"/>
      <stop offset="0.62" stop-color="#06171a" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#06171a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1200" height="630" fill="url(#sky)"/>
  <!-- sun glow -->
  <circle cx="960" cy="180" r="230" fill="url(#sun)"/>
  <circle cx="960" cy="180" r="66" fill="#fff4c4"/>
  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="70" r="2.4" opacity="0.9"/>
    <circle cx="240" cy="120" r="1.8" opacity="0.7"/>
    <circle cx="360" cy="60" r="2" opacity="0.8"/>
    <circle cx="470" cy="140" r="1.6" opacity="0.6"/>
    <circle cx="150" cy="200" r="1.6" opacity="0.6"/>
    <circle cx="560" cy="80" r="2.2" opacity="0.85"/>
    <circle cx="70" cy="150" r="1.5" opacity="0.55"/>
    <circle cx="680" cy="120" r="1.7" opacity="0.7"/>
    <circle cx="300" cy="185" r="1.4" opacity="0.5"/>
    <circle cx="430" cy="40" r="1.5" opacity="0.6"/>
  </g>
  <!-- hills -->
  <path d="M0 470 C 220 400, 430 470, 640 452 C 860 434, 1040 486, 1200 452 L 1200 630 L 0 630 Z" fill="url(#hillB)"/>
  <path d="M0 540 C 260 486, 500 556, 760 528 C 980 505, 1080 552, 1200 534 L 1200 630 L 0 630 Z" fill="url(#hillA)"/>

  <!-- left scrim for text legibility -->
  <rect width="1200" height="630" fill="url(#scrim)"/>

  <!-- brand mark -->
  <g transform="translate(90,86)">
    <circle cx="15" cy="14" r="16" fill="url(#berry)"/>
    <circle cx="9" cy="9" r="3.4" fill="#ffffff" opacity="0.55"/>
    <text x="46" y="24" fill="#ffffff" font-size="30" font-weight="700" letter-spacing="0.3">CloudberryOS</text>
  </g>

  <!-- headline -->
  <text x="90" y="300" fill="#ffffff" font-size="74" font-weight="800" letter-spacing="-1.5">The internet as a</text>
  <text x="90" y="382" fill="#ffffff" font-size="74" font-weight="800" letter-spacing="-1.5">library, <tspan fill="#ffd477">not a casino.</tspan></text>

  <!-- subline -->
  <text x="92" y="446" fill="#dfe9e6" font-size="29" font-weight="500">A calm, curated Ubuntu computer for curious kids —</text>
  <text x="92" y="484" fill="#dfe9e6" font-size="29" font-weight="500">a workshop and a library, not an open feed.</text>

  <!-- url pill -->
  <g transform="translate(90,528)">
    <rect x="0" y="0" width="250" height="48" rx="24" fill="#ffffff" opacity="0.12"/>
    <text x="26" y="31" fill="#ffe08a" font-size="24" font-weight="700" letter-spacing="0.5">cloudberryos.org</text>
  </g>
</svg>
